<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Delivery ASWA</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f0f0;
}

.banner{
    width:800px;
    height:1200px;
    background: url('Gotas brillantes sobre fondo amarillo.png') center/cover;
    position:relative;
    overflow:hidden;
    text-align:center;
}

.logo{
    width:350px;
    margin-top:60px;
}

.qr-container{
    background:white;
    width:500px;
    padding:30px;
    border-radius:30px;
    margin:40px auto;
}

.qr{
    width:100%;
}

.boton{
    background:#1a9d8f;
    color:white;
    padding:20px;
    border-radius:50px;
    width:400px;
    margin:20px auto;
    font-size:28px;
    font-weight:bold;
}

.frase{
    font-size:60px;
    color:#0a7d2f;
    font-weight:bold;
    margin-top:30px;
}
</style>
</head>
<body>
<div class="banner">
    <img src="logo de aswa.jpg" class="logo">
    <div class="qr-container">
        <img src="qr-aswa.png" class="qr">
    </div>
    <div class="boton">
       📱 Escanea aquí y pide tu delivery
    </div>
    <div class="frase">
        El oro líquido de la selva
    </div>
</div>
</body>
</html>
